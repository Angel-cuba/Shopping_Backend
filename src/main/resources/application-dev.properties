# Development profile
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
DB_HOST=localhost
DB_PORT=5433
DB_NAME=shopping_db
DB_USERNAME=shopping_user
DB_PASSWORD=shopping123

# JWT secret — dev only, must be >= 32 chars for HS256
SECRET_KEY=Shopping2026_SecretKey_JWT_Integrify_32chars_min!

# Flyway — baseline-on-migrate lets Flyway adopt the existing schema on first run
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
